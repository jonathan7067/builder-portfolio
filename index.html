<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloc‑Notes</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: Arial, sans-serif;
        background: #f7f7f7;
    }
    textarea {
        flex: 1;
        width: 100%;
        padding: 20px;
        font-size: 18px;
        border: none;
        resize: none;
        outline: none;
        background: #fff;
        box-sizing: border-box;
    }
    h1 {
        margin: 0;
        padding: 15px;
        background: #4CAF50;
        color: white;
        text-align: center;
        font-weight: normal;
    }
</style>
</head>
<body>

<h1>Bloc‑Notes</h1>
<textarea id="note" placeholder="Écris tes idées et tes chose a faire..."></textarea>

<script>
// Charger le texte sauvegardé
const note = document.getElementById('note');
note.value = localStorage.getItem('blocNote') || '';

// Sauvegarder automatiquement à chaque frappe
note.addEventListener('input', () => {
    localStorage.setItem('blocNote', note.value);
});
</script>

</body>
</html>
